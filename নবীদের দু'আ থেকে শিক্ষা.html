<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>নবীদের দু'আ থেকে শিক্ষা — Lessons from the Prophets</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F5F0E8;
    --bg2:       #EDE6D6;
    --gold:      #B8860B;
    --gold-lt:   #D4A843;
    --gold-faint:#F0E6CC;
    --gold-deep: #7A5C00;
    --text:      #2C1F0E;
    --text-mid:  #5C4430;
    --text-muted:#8A7055;
    --border:    #D5C8A8;
    --white:     #FFFDF6;
    --shadow:    rgba(60,35,5,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
  }

  /* ─── Hero ─── */
  .hero {
    background: var(--text);
    padding: 64px 48px 52px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 80% at 50% 110%, rgba(184,134,11,0.18) 0%, transparent 60%),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(184,134,11,0.04) 60px,
        rgba(184,134,11,0.04) 61px
      );
    pointer-events: none;
  }

  .hero-ornament {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-lt);
    opacity: 0.8;
    margin-bottom: 20px;
  }

  .hero-arabic {
    font-size: 36px;
    color: var(--gold-lt);
    margin-bottom: 10px;
    font-family: 'Lora', serif;
    font-style: italic;
    letter-spacing: 0.02em;
    position: relative;
    z-index: 1;
    direction: rtl;
    font-family: Georgia, serif;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }

  .hero h1 span { color: var(--gold-lt); }

  .hero-sub {
    font-family: 'Lora', serif;
    font-size: 15px;
    font-style: italic;
    color: rgba(255,255,255,0.55);
    position: relative;
    z-index: 1;
    margin-top: 8px;
  }

  .hero-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    max-width: 360px;
    margin: 28px auto 0;
    position: relative;
    z-index: 1;
  }
  .hero-divider::before,
  .hero-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .hero-divider::after {
    background: linear-gradient(to left, transparent, var(--gold));
  }
  .hero-gem {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ─── Filter bar ─── */
  .filter-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 48px;
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-pill {
    flex-shrink: 0;
    padding: 14px 18px;
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.18s, border-color 0.18s;
    white-space: nowrap;
  }
  .filter-pill:hover { color: var(--gold); }
  .filter-pill.active {
    color: var(--gold-deep);
    font-weight: 500;
    border-bottom-color: var(--gold);
  }

  /* ─── Grid ─── */
  .grid-section {
    padding: 48px 40px 80px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 28px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label span {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--gold);
    font-style: italic;
    letter-spacing: 0;
    text-transform: none;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 28px;
  }

  /* ─── Prophet Card ─── */
  .prophet-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 2px 16px var(--shadow);
    transition: transform 0.22s, box-shadow 0.22s;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }

  .prophet-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(60,35,5,0.15);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* stagger */
  .prophet-card:nth-child(1)  { animation-delay: 0.02s; }
  .prophet-card:nth-child(2)  { animation-delay: 0.06s; }
  .prophet-card:nth-child(3)  { animation-delay: 0.10s; }
  .prophet-card:nth-child(4)  { animation-delay: 0.14s; }
  .prophet-card:nth-child(5)  { animation-delay: 0.18s; }
  .prophet-card:nth-child(6)  { animation-delay: 0.22s; }
  .prophet-card:nth-child(7)  { animation-delay: 0.26s; }
  .prophet-card:nth-child(8)  { animation-delay: 0.30s; }

  /* Card header */
  .card-header {
    padding: 22px 24px 18px;
    position: relative;
    border-left: 4px solid var(--accent);
  }

  .card-header-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .prophet-badge {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--accent-faint, #F0E6CC);
    border: 1.5px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  .card-prophet-info {
    flex: 1;
  }

  .card-prophet-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .card-meta {
    font-family: 'Lora', serif;
    font-size: 11.5px;
    font-style: italic;
    color: var(--text-muted);
  }

  .card-count-badge {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-faint, #F0E6CC);
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 2px;
  }

  /* divider inside card */
  .card-sep {
    height: 1px;
    background: linear-gradient(to right, var(--accent), transparent);
    opacity: 0.25;
    margin: 14px 24px 0;
  }

  /* Lessons list */
  .lessons-list {
    padding: 16px 24px 22px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .lesson-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    align-items: flex-start;
  }
  .lesson-item:last-child { border-bottom: none; }

  .lesson-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent-faint, #F0E6CC);
    border: 1.5px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .lesson-dot-inner {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .lesson-content {
    flex: 1;
  }

  .lesson-topic {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 2px;
    opacity: 0.85;
  }

  .lesson-text {
    font-family: 'Lora', serif;
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text-mid);
  }

  /* Card footer */
  .card-footer {
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--accent-faint, #F0E6CC) 0%, transparent 100%);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .footer-gem {
    width: 5px; height: 5px;
    background: var(--accent);
    transform: rotate(45deg);
    opacity: 0.5;
  }

  .footer-text {
    font-family: 'Lora', serif;
    font-size: 11px;
    font-style: italic;
    color: var(--text-muted);
  }

  /* ─── Single view ─── */
  .single-view {
    display: none;
    padding: 40px 40px 80px;
    max-width: 820px;
    margin: 0 auto;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    margin-bottom: 28px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--white);
    transition: all 0.15s;
  }
  .back-btn:hover { color: var(--gold); border-color: var(--gold-lt); background: var(--gold-faint); }

  /* ─── Search ─── */
  .search-wrap {
    padding: 20px 48px 0;
    background: var(--bg);
  }
  .search-box {
    width: 100%;
    max-width: 480px;
    padding: 10px 18px;
    font-family: 'Lora', serif;
    font-size: 14px;
    color: var(--text);
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 2px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--gold-lt); }
  .search-box::placeholder { color: var(--text-muted); font-style: italic; }

  /* ─── Stats bar ─── */
  .stats-bar {
    display: flex;
    gap: 32px;
    padding: 18px 48px;
    border-bottom: 1px solid var(--border);
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-family: 'Lora', serif;
    font-size: 11px;
    font-style: italic;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ─── Responsive ─── */
  @media (max-width: 640px) {
    .hero { padding: 40px 24px 36px; }
    .grid-section { padding: 28px 16px 60px; }
    .filter-bar { padding: 0 16px; }
    .search-wrap { padding: 16px 16px 0; }
    .stats-bar { padding: 14px 16px; gap: 20px; }
    .cards-grid { grid-template-columns: 1fr; gap: 20px; }
    .single-view { padding: 24px 16px 60px; }
  }
</style>
</head>
<body>

<!-- Hero -->
<header class="hero">
  <div class="hero-ornament">Lessons from the Prophets · শিক্ষার আলো</div>
  <div class="hero-arabic">﴾ وَلَقَدْ أَرْسَلْنَا رُسُلًا مِّن قَبْلِكَ ﴿</div>
  <h1>নবীদের দু'আ থেকে<br><span>আমাদের জীবনের শিক্ষা</span></h1>
  <p class="hero-sub">২৫ জন নবীর কুরআনিক দু'আ — প্রতিটি থেকে একটি করে জীবনের আলো</p>
  <div class="hero-divider"><div class="hero-gem"></div></div>
</header>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat"><div class="stat-num">২৫</div><div class="stat-label">নবী</div></div>
  <div class="stat"><div class="stat-num" id="statDuas">১৮৬</div><div class="stat-label">দু'আ</div></div>
  <div class="stat"><div class="stat-num" id="statLessons">১৮৬</div><div class="stat-label">শিক্ষা</div></div>
</div>

<!-- Search -->
<div class="search-wrap">
  <input class="search-box" type="text" id="searchBox" placeholder="শিক্ষা বা নবীর নাম খুঁজুন…" oninput="onSearch(this.value)">
</div>

<!-- Filter pills -->
<div class="filter-bar" id="filterBar">
  <div class="filter-pill active" onclick="filterAll(this)">সকল নবী</div>
</div>

<!-- Grid -->
<div class="grid-section" id="gridSection">
  <div class="section-label">
    সকল নবীর শিক্ষা <span id="visibleCount"></span>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<script>
const COLORS = ["#B8860B", "#8B6508", "#C4922A", "#A0522D", "#7B6B3D", "#6B8E23", "#2E8B57", "#20695C", "#2B6CB0", "#553C8B", "#7B3F00", "#9C4A1A", "#8B4513", "#5F4B32", "#4A6741", "#1B5E7B", "#344E5C", "#7D3C5F", "#6B3A5D", "#8B3A52", "#4A4A8A", "#5C4A1E", "#3D6B4F", "#6B4226", "#8B6914"];

let activeFilter = -1; // -1 = all
let searchQuery = '';

function hexToFaint(hex) {
  return hex + FAINT_OPACITY;
}

function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  DATA.forEach((p, i) => {
    const pill = document.createElement('div');
    pill.className = 'filter-pill';
    pill.textContent = p.short;
    pill.onclick = () => filterProphet(i, pill);
    bar.appendChild(pill);
  });
}

function filterAll(el) {
  activeFilter = -1;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function filterProphet(i, el) {
  activeFilter = i;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderCards();
  // Scroll grid into view
  document.getElementById('gridSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function onSearch(val) {
  searchQuery = val.toLowerCase().trim();
  renderCards();
}

  grid.innerHTML = '';

  let shown = 0;
  DATA.forEach((p, pi) => {
    if (activeFilter !== -1 && activeFilter !== pi) return;

    // Filter lessons by search
    let lessons = p.lessons;
    if (searchQuery) {
      lessons = lessons.filter(l =>
        l.lesson.toLowerCase().includes(searchQuery) ||
        l.topic.toLowerCase().includes(searchQuery) ||
        p.short.toLowerCase().includes(searchQuery)
      );
    }
    if (lessons.length === 0 && searchQuery) return;

    shown++;
    const color = COLORS[pi % COLORS.length];
    const faint = hexToFaint(color);

    const card = document.createElement('div');
    card.className = 'prophet-card';
    card.style.setProperty('--accent', color);
    card.style.setProperty('--accent-faint', faint);
    card.style.animationDelay = (shown * 0.035) + 's';

    // Lessons HTML
    const lessonsHtml = lessons.map(l => `
      <div class="lesson-item">
        <div class="lesson-dot"><div class="lesson-dot-inner"></div></div>
        <div class="lesson-content">
          <div class="lesson-topic">${l.topic}</div>
          <div class="lesson-text">${l.lesson}</div>
        </div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="card-header" style="border-left-color:${color}">
        <div class="card-header-top">
          <div class="prophet-badge">${String(p.id).padStart(2,'0')}</div>
          <div class="card-prophet-info">
            <div class="card-prophet-name">${p.short}</div>
            <div class="card-meta">কুরআনিক দু'আ থেকে শিক্ষা</div>
          </div>
          <div class="card-count-badge">${lessons.length}টি শিক্ষা</div>
        </div>
      </div>
      <div class="card-sep"></div>
      <div class="lessons-list">${lessonsHtml}</div>
      <div class="card-footer">
        <div class="footer-gem"></div>
        <div class="footer-text">${p.count} টি দু'আ — প্রতিটিতে একটি করে শিক্ষা</div>
      </div>
    `;

    grid.appendChild(card);
  });

  label.textContent = shown > 0 ? `— ${shown} জন নবী দেখাচ্ছে` : '';

  if (shown === 0) {
    grid.innerHTML = `<div style="padding:40px;color:var(--text-muted);font-style:italic;font-family:Lora,serif;grid-column:1/-1;text-align:center">কোনো ফলাফল পাওয়া যায়নি</div>`;
  }
}

// Stats
function updateStats() {
  let totalLessons = DATA.reduce((acc, p) => acc + p.lessons.length, 0);
  document.getElementById('statDuas').textContent = totalLessons;
  document.getElementById('statLessons').textContent = totalLessons;
}

buildFilterBar();
updateStats();
renderCards();
</script>
</body>
</html>
