    function toBengaliNum(n) {
      const digits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
      return String(n).split('').map(d => digits[parseInt(d)] ?? d).join('');
    }

    function renderCards(data) {
      const grid = document.getElementById('wordGrid');
      const noResults = document.getElementById('noResults');
      const visibleCount = document.getElementById('visibleCount');

      grid.innerHTML = '';
      if (data.length === 0) {
        noResults.classList.remove('hidden');
        visibleCount.textContent = '০';
        return;
      }
      noResults.classList.add('hidden');
      visibleCount.textContent = toBengaliNum(data.length);

      data.forEach((w, i) => {
        const card = document.createElement('div');
        card.className = 'card bg-white border border-border-warm rounded-2xl overflow-hidden shadow-sm cursor-default';
        card.style.animationDelay = `${Math.min(i * 0.03, 0.6)}s`;
        card.innerHTML = `
          <div class="bg-parchment px-4 pt-4 pb-3 border-b border-border-warm flex items-start justify-between gap-2">
            <span class="number-badge font-display font-bold text-xl leading-none">${toBengaliNum(w.n)}</span>
            <span class="arabic-text text-4xl text-ink leading-tight text-right flex-1">${w.ar}</span>
          </div>
          <div class="flex justify-between px-4 pt-3 pb-4 space-y-2">
            <div class="flex items-start gap-2">
              <span class="font-bengali text-ink  leading-snug">${w.bn}</span>
            </div>
            <div class="flex items-start gap-2">
              <span class="text-ink-light  leading-snug font-medium tracking-wide">${w.en}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function filterWords() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!query) { renderCards(words); return; }
      const filtered = words.filter(w =>
        w.ar.includes(query) ||
        w.bn.toLowerCase().includes(query) ||
        w.en.toLowerCase().includes(query)
      );
      renderCards(filtered);
    }

    renderCards(words);
  </script>
</body>
