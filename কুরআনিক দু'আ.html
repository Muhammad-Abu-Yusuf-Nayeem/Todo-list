<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>নবীদের দু'আ — Duas of the Prophets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #F7F3EC;
    --bg-sidebar:   #EDE7DA;
    --bg-card:      #FFFDF8;
    --gold:         #B8860B;
    --gold-light:   #D4A843;
    --gold-faint:   #F0E6CC;
    --gold-deep:    #8B6508;
    --text:         #3D2E1A;
    --text-muted:   #7A6245;
    --text-light:   #A89070;
    --border:       #D9CDB8;
    --border-gold:  #C9A84C;
    --arabic-color: #5C3D11;
    --shadow:       rgba(90,60,15,0.12);
    --sidebar-w:    280px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    overflow: hidden;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 10;
  }

  .sidebar-header {
    padding: 28px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-sidebar);
    flex-shrink: 0;
  }

  .sidebar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .sidebar-sub {
 font-family: "Scheherazade New", serif;
    font-size: 18px;
    color: var(--text-muted);
    line-height: 1.3;
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    scroll-behavior: smooth;
  }

  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 2px; }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
    border-left: 3px solid transparent;
    position: relative;
  }

  .sidebar-item:hover {
    background: var(--gold-faint);
    border-left-color: var(--gold-light);
  }

  .sidebar-item.active {
    background: var(--gold-faint);
    border-left-color: var(--gold);
  }

  .sidebar-num {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    min-width: 22px;
    opacity: 0.8;
  }

  .sidebar-name {
    font-size: 13px;
    line-height: 1.4;
    color: var(--text);
    flex: 1;
  }

  .sidebar-item.active .sidebar-name {
    color: var(--gold-deep);
    font-weight: 500;
  }

  .sidebar-count {
    font-size: 10px;
    color: var(--text-light);
    background: var(--border);
    padding: 1px 6px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .sidebar-item.active .sidebar-count {
    background: var(--gold-light);
    color: #fff;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }

  /* ornamental background */
  .main::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(184,134,11,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(184,134,11,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Top bar ── */
  .topbar {
    padding: 20px 48px 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .prophet-heading {
    flex: 1;
  }

  .prophet-number {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .prophet-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .dua-counter {
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--text-muted);
    text-align: right;
    padding-bottom: 4px;
  }

  .dua-counter span {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
  }

  /* ── Divider ── */
  .ornament-line {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 48px 0;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .ornament-line::before,
  .ornament-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border-gold), transparent);
  }

  .ornament-diamond {
    width: 7px;
    height: 7px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.6;
  }

  /* ── Card area ── */
  .card-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 48px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .card-area::-webkit-scrollbar { width: 5px; }
  .card-area::-webkit-scrollbar-track { background: transparent; }
  .card-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .dua-card {
    width: 100%;
    max-width: 720px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-top: 3px solid var(--gold);
    border-radius: 4px;
    padding: 40px 48px 36px;
    box-shadow: 0 4px 30px var(--shadow), 0 1px 4px rgba(0,0,0,0.06);
    animation: cardIn 0.38s cubic-bezier(0.22, 1, 0.36, 1) both;
    position: relative;
    overflow: hidden;
  }

  .dua-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 120px; height: 120px;
    background: radial-gradient(circle at top right, rgba(184,134,11,0.06), transparent 70%);
    pointer-events: none;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Title row */
  .card-title-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .card-dua-num {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--gold-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
  }

  .card-ref {
    font-family: 'Lora', serif;
    font-size: 12px;
    font-style: italic;
    color: var(--gold);
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Arabic */
  .arabic-block {
    background: linear-gradient(135deg, #FEFAF2 0%, #FAF3E0 100%);
    border: 1px solid var(--gold-faint);
    border-radius: 3px;
    padding: 28px 32px;
    text-align: center;
    margin-bottom: 20px;
    position: relative;
  }

  .arabic-text {
 font-family: "Scheherazade New", serif;
    font-size: 32px;
    line-height: 1.85;
    color: var(--arabic-color);
    direction: rtl;
    display: block;
  }

  .transliteration {
    font-family: 'Lora', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-muted);
    margin-top: 12px;
    display: block;
    letter-spacing: 0.03em;
  }

  /* Info rows */
  .info-grid {
    display: grid;
    gap: 14px;
    margin-top: 4px;
  }

  .info-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 12px;
    align-items: start;
  }

  .info-label {
    font-family: 'Playfair Display', serif;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    padding-top: 2px;
    opacity: 0.85;
  }

  .info-value {
    font-family: 'Lora', serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .info-row + .info-row {
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  /* ── Nav buttons ── */
  .nav-row {
    width: 100%;
    max-width: 720px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    gap: 12px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--text-muted);
    transition: all 0.18s;
    letter-spacing: 0.02em;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--gold-faint);
    border-color: var(--gold-light);
    color: var(--gold-deep);
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .nav-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .progress-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 300px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .dot.active {
    background: var(--gold);
    transform: scale(1.3);
  }

  .dot:hover {
    background: var(--gold-light);
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .sidebar { width: 220px; min-width: 220px; }
    :root { --sidebar-w: 220px; }
    .topbar, .ornament-line, .card-area { padding-left: 20px; padding-right: 20px; }
    .dua-card { padding: 24px 22px 20px; }
    .arabic-text { font-size: 26px; }
    .info-row { grid-template-columns: 90px 1fr; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Duas of the Prophets</div>
      <div class="sidebar-sub">نبیوں کی دعائیں</div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="prophet-heading">
        <div class="prophet-number" id="prophetNumber"></div>
        <div class="prophet-title" id="prophetTitle"></div>
      </div>
      <div class="dua-counter">
        দু'আ <span id="duaCurrent">1</span> / <span id="duaTotal">1</span>
      </div>
    </div>

    <div class="ornament-line">
      <div class="ornament-diamond"></div>
    </div>

    <div class="card-area" id="cardArea">
      <div class="dua-card" id="duaCard">
        <!-- filled by JS -->
      </div>
      <div class="nav-row" id="navRow">
        <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          পূর্ববর্তী
        </button>
        <div class="progress-dots" id="progressDots"></div>
        <button class="nav-btn" id="btnNext" onclick="navigate(1)">
          পরবর্তী
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

  </main>
</div>

r": 1}, {"title": "দু'আ ২ — বিচারকার্যে ভুল হওয়ার পর তাওবা", "reference": "সূরা সোয়াদ ৩৮:২৪", "arabic": "وَظَنَّ دَاوُۥدُ أَنَّمَا فَتَنَّٰهُ فَٱسۡتَغۡفَرَ رَبَّهُۥ وَخَرَّ رَاكِعًا وَأَنَابَ", "situation": "দুজন লোক বিচার নিয়ে এলেন। একজনের ৯৯টি ভেড়া, অন্যজনের মাত্র ১টি। ৯৯টির মালিক ১টিও চাইছেন। দাউদ (AS) না শুনেই রায় দিলেন। তখন বুঝলেন — এটা পরীক্ষা ছিল। অনুতাপে সিজদায় পড়ে গেলেন — কাঁদলেন", "purpose": "তাড়াহুড়ো করে বিচার করার ভুলের জন্য তাৎক্ষণিক তাওবা। ক্ষমতায় থেকেও ভুল স্বীকার করা — অহংকার নয়, বিনয়", "learning": "আমাদের জন্য শিক্ষাক্ষমতায় থাকলেও ভুল হয় — বড়রাও সিজদায় পড়ে কাঁদেন। তাওবায় দেরি করবেন না", "dua_number": 2}, {"title": "দু'আ ৩ — আল্লাহর কাছে ক্ষমা ও ফিরে আসার দু'আ", "reference": "সূরা সোয়াদ ৩৮:৩৫", "arabic": "رَبِّ ٱغۡفِرۡ لِى وَهَبۡ لِى مُلۡكًا لَّا يَنۢبَغِى لِأَحَدٍ مِّنۢ بَعۡدِىٓ إِنَّكَ أَنتَ ٱلۡوَهَّابُ", "situation": "দাউদ (AS) এর তাওবার পর আল্লাহ ক্ষমা করলেন এবং রাজত্ব আরও মজবুত করলেন। পুত্র সুলাইমান (AS) এই দু'আ করলেন — পিতার বিনয় দেখে অনুপ্রাণিত হয়ে", "purpose": "ক্ষমার পর আরও বড় নেয়ামত চাওয়া — কিন্তু সম্পূর্ণ বিনয়ের সাথে। \"আপনি মহাদাতা\" বলে আল্লাহর গুণ স্বীকার", "learning": "আমাদের জন্য শিক্ষাতাওবার পর হতাশ হবেন না — আল্লাহ ক্ষমা করলে আরও বড় নেয়ামত দিতে পারেন", "dua_number": 3}, {"title": "দু'আ ৪ — পাহাড় ও পাখির সাথে তাসবীহ", "reference": "সূরা সোয়াদ ৩৮:১৮-১৯", "arabic": "إِنَّا سَخَّرۡنَا ٱلۡجِبَالَ مَعَهُۥ يُسَبِّحۡنَ بِٱلۡعَشِىِّ وَٱلۡإِشۡرَاقِ وَٱلطَّيۡرَ مَحۡشُورَةً كُلٌّ لَّهُۥٓ أَوَّابٌ", "situation": "দাউদ (AS) যখন তাসবীহ পড়তেন — আল্লাহ পাহাড় ও পাখিদের তাঁর সাথে তাসবীহ করার নির্দেশ দিতেন। সকাল ও সন্ধ্যায় পুরো প্রকৃতি তাঁর সাথে আল্লাহর গুণগান করত", "purpose": "এটি দু'আর জবাব — আল্লাহ দাউদ (AS) এর ইবাদতে এতটাই সন্তুষ্ট ছিলেন যে পুরো প্রকৃতিকে তাঁর সাথী বানিয়ে দিলেন", "learning": "আমাদের জন্য শিক্ষাআন্তরিক তাসবীহ ও যিকির — আল্লাহ পুরো পৃথিবীকে আপনার পক্ষে করে দিতে পারেন", "dua_number": 4}, {"title": "দু'আ ৫ — আল্লাহর শুকরিয়া ও বিচারের দু'আ", "reference": "সূরা আন-নামল ২৭:১৫", "arabic": "ٱلۡحَمۡدُ لِلَّهِ ٱلَّذِى فَضَّلَنَا عَلَىٰ كَثِيرٍ مِّنۡ عِبَادِهِ ٱلۡمُؤۡمِنِينَ", "transliteration": "Alhamdulillahil-ladhi faddalana 'ala kathirim min 'ibadihil-mu'minin", "situation": "আল্লাহ দাউদ ও সুলাইমান (AS) কে বিশেষ জ্ঞান দিলেন। তাঁরা বললেন — \"সব প্রশংসা আল্লাহর — যিনি আমাদের তাঁর অনেক মুমিন বান্দার উপর মর্যাদা দিয়েছেন\"", "purpose": "নেয়ামত পেয়ে অহংকার নয় — শুকরিয়া আদায়। \"এটা আমার যোগ্যতা\" নয় — \"এটা আল্লাহর অনুগ্রহ\"", "learning": "আমাদের জন্য শিক্ষাপুরস্কার বা সাফল্য পেলে প্রথমে বলুন — \"আলহামদুলিল্লাহ — এটা আমার নয়, আল্লাহর দান\"", "dua_number": 5}, {"title": "দু'আ ৬ — খলিফা হিসেবে ন্যায়বিচারের দায়িত্ব", "reference": "সূরা সোয়াদ ৩৮:২৬", "arabic": "يَٰدَاوُۥدُ إِنَّا جَعَلۡنَٰكَ خَلِيفَةً فِى ٱلۡأَرۡضِ فَٱحۡكُم بَيۡنَ ٱلنَّاسِ بِٱلۡحَقِّ وَلَا تَتَّبِعِ ٱلۡهَوَىٰ", "situation": "আল্লাহ দাউদ (AS) কে সরাসরি বললেন — \"আমি তোমাকে পৃথিবীতে খলিফা বানিয়েছি। সত্য দিয়ে বিচার করো — খেয়ালখুশির অনুসরণ করো না।\" এটি একটি ভয়াবহ সতর্কতা", "purpose": "ক্ষমতার দায়িত্ব স্মরণ করিয়ে দেওয়া। \"প্রবৃত্তির অনুসরণ করলে আল্লাহর পথ থেকে বিচ্যুত হবে।\"", "learning": "আমাদের জন্য শিক্ষাযেকোনো দায়িত্বে — পরিবার, অফিস, সমাজ — ন্যায়বিচার করুন। খেয়ালখুশি নয় — আল্লাহর নির্দেশ মানুন", "dua_number": 6}, {"title": "দু'আ ৭ — তাওবার পর আল্লাহর ক্ষমার ঘোষণা", "reference": "সূরা সোয়াদ ৩৮:২৫", "arabic": "فَغَفَرۡنَا لَهُۥ ذَٰلِكَ وَإِنَّ لَهُۥ عِندَنَا لَزُلۡفَىٰ وَحُسۡنَ مَـَٔابٍ", "situation": "দাউদ (AS) সিজদায় পড়ে কাঁদলেন — ৪০ দিন একনাগাড়ে কাঁদলেন বলে বর্ণিত আছে। এই গভীর তাওবার পর আল্লাহ ঘোষণা দিলেন — \"আমি ক্ষমা করে দিলাম\"", "purpose": "এটি আল্লাহর পক্ষ থেকে জবাব — গভীর তাওবার পুরস্কার। শুধু ক্ষমা নয় — \"তার জন্য আমার কাছে উচ্চ মর্যাদা আছে\"", "learning": "আমাদের জন্য শিক্ষাসত্যিকারের তাওবায় আল্লাহ শুধু ক্ষমা করেন না — মর্যাদাও বাড়িয়ে দেন", "dua_number": 7}]}, {"id": 9, "name": "009 🕌 নবী সুলাইমান (AS) এর কুরআনিক দু'আ", "duas": [{"title": "দু'আ ১ — পিপড়ার কথা শুনে কৃতজ্ঞতার দু'আ", "reference": "সূরা আন-নামল ২৭:১৯", "arabic": "رَبِّ أَوۡزِعۡنِىٓ أَنۡ أَشۡكُرَ نِعۡمَتَكَ ٱلَّتِىٓ أَنۡعَمۡتَ عَلَىَّ وَعَلَىٰ وَٰلِدَىَّ وَأَنۡ أَعۡمَلَ صَٰلِحًا تَرۡضَىٰهُ وَأَدۡخِلۡنِى بِرَحۡمَتِكَ فِى عِبَادِكَ ٱلصَّٰلِحِينَ", "transliteration": "Rabbi awzi'ni an ashkura ni'matakal-lati an'amta 'alayya wa 'ala walidayya wa an a'mala salihan tardahu wa adkhilni birahmatika fi 'ibadikas-salihin", "situation": "বিশাল বাহিনী নিয়ে যাচ্ছেন — মানুষ, জিন, পাখি সবাই সাথে। হঠাৎ একটি পিপড়া অন্য পিপড়াদের বলছে — \"ঘরে ঢুকে যাও — সুলাইমানের বাহিনী আসছে, পিষে ফেলবে।\" সুলাইমান (AS) পিপড়ার কথা শুনলেন — হাসলেন — এবং সাথে সাথে আল্লাহর শুকরিয়া করলেন", "purpose": "পিপড়ার মতো ক্ষুদ্র প্রাণীর কথাও শুনতে পারার নেয়ামতের শুকরিয়া। তিনটি জিনিস চাওয়া — শুকরিয়া করার তাওফিক + নেক আমল করার শক্তি + নেককারদের সাথে থাকা", "learning": "আমাদের জন্য শিক্ষাছোট নেয়ামতেও শুকরিয়া করুন — সুলাইমান (AS) পৃথিবীর সবচেয়ে বড় রাজা হয়েও পিপড়ার কথায় থামলেন", "dua_number": 1}, {"title": "দু'আ ২ — অতুলনীয় রাজত্ব চাওয়া", "reference": "সূরা সোয়াদ ৩৮:৩৫", "arabic": "رَبِّ ٱغۡفِرۡ لِى وَهَبۡ لِى مُلۡكًا لَّا يَنۢبَغِى لِأَحَدٍ مِّنۢ بَعۡدِىٓ إِنَّكَ أَنتَ ٱلۡوَهَّابُ", "transliteration": "Rabbighfir li wa hab li mulkan la yanbaghi li-ahadin min ba'di innaka antal-Wahhab", "situation": "একদিন ঘোড়াগুলো দেখতে দেখতে আসরের নামাজ ভুলে গেলেন। বুঝতে পারলেন — ভুল হয়েছে। ঘোড়াগুলো সরিয়ে দিলেন। তারপর আল্লাহর কাছে ক্ষমা চাইলেন এবং এমন রাজত্ব চাইলেন যা আর কেউ পাবে না", "purpose": "প্রথমে ক্ষমা — তারপর চাওয়া। \"আপনি মহাদাতা\" বলে আল্লাহর গুণ স্বীকার করে বিশেষ রাজত্ব চাওয়া। এটি অহংকার নয় — আল্লাহর কুদরত প্রমাণের জন্য", "learning": "আমাদের জন্য শিক্ষাবড় কিছু চাইতে লজ্জা নেই — আল্লাহ \"ওয়াহহাব\" অর্থাৎ মহাদাতা। তবে আগে ক্ষমা চান", "dua_number": 2}, {"title": "দু'আ ৩ — হুদহুদ পাখির সংবাদের পর শুকরিয়া", "reference": "সূরা আন-নামল ২৭:৪০", "arabic": "هَٰذَا مِن فَضۡلِ رَبِّى لِيَبۡلُوَنِىٓ أَءۡشۡكُرُ أَمۡ أَكۡفُرُ", "transliteration": "Hadha min fadli Rabbi liyabluwani a-ashkuru am akfur", "situation": "বিলকিসের সিংহাসন এক মুহূর্তে তাঁর দরবারে এসে গেল — হাজার মাইল দূর থেকে। এই অসাধারণ ঘটনা দেখে সুলা n": "বিনইয়ামিন মিশরে আটকে গেল — চুরির মিথ্যা অভিযোগে। রুবাইল ফিরে এলেন না — মিশরেই থেকে গেলেন। ইয়াকুব (AS) এখন তিন পুত্রকে হারালেন। এই মুহূর্তে আবার বললেন \"ফাসাবরুন জামীল\"", "purpose": "দ্বিতীয়বার \"ফাসাবরুন জামীল\" — আরও বড় বিপদে। এবার যোগ হলো আশা — \"হয়তো আল্লাহ তাদের সবাইকে ফিরিয়ে দেবেন।\" বিপদে আশা ছাড়বেন না", "learning": "আমাদের জন্য শিক্ষাবিপদের উপর বিপদ আসলেও — আশা ছাড়বেন না। \"হয়তো আল্লাহ সব ঠিক করবেন\" — এই আশাই ঈমানের শক্তি", "dua_number": 6}, {"title": "দু'আ ৭ — ইউসুফের খোঁজ ছাড়বেন না", "reference": "সূরা ইউসুফ ১২:৮৭", "arabic": "يَٰبَنِىَّ ٱذۡهَبُواْ فَتَحَسَّسُواْ مِن يُوسُفَ وَأَخِيهِ وَلَا تَاْيۡـَٔسُواْ مِن رَّوۡحِ ٱللَّهِ إِنَّهُۥ لَا يَاْيۡـَٔسُ مِن رَّوۡحِ ٱللَّهِ إِلَّا ٱلۡقَوۡمُ ٱلۡكَٰفِرُونَ", "transliteration": "Wa la tay'asu mir-rawhillahi innahu la yay'asu mir-rawhillahi illal-qawmul-kafirun", "situation": "দীর্ঘ বছর পর। চোখ নষ্ট হওয়ার পথে। সবাই হাল ছেড়ে দিয়েছে — শুধু ইয়াকুব (AS) ছাড়া। সন্তানদের বললেন — \"যাও, ইউসুফ ও তার ভাইয়ের খোঁজ করো। আল্লাহর রহমত থেকে হতাশ হয়ো না।\"", "purpose": "কুরআনের সবচেয়ে আশাবাদী আয়াতগুলোর একটি। \"আল্লাহর রহমত থেকে শুধু কাফিররাই হতাশ হয়।\" মুমিন কখনো আশা ছাড়ে না — যত কঠিন পরিস্থিতিই হোক", "learning": "আমাদের জন্য শিক্ষাআল্লাহর রহমত থেকে কখনো হতাশ হবেন না — যত দেরি হোক, যত কষ্ট হোক", "dua_number": 7}, {"title": "দু'আ ৮ — ইউসুফের জামা চোখে লাগানোর পর", "reference": "সূরা ইউসুফ ১২:৯৬", "arabic": "أَلَمۡ أَقُل لَّكُمۡ إِنِّىٓ أَعۡلَمُ مِنَ ٱللَّهِ مَا لَا تَعۡلَمُونَ", "transliteration": "Alam aqul lakum inni a'lamu minallahi ma la ta'lamun", "situation": "ইউসুফ (AS) জামা পাঠালেন — \"এটা আব্বার চোখে দাও।\" দূত এলেন। ইয়াকুব (AS) গন্ধ পেলেন — বললেন \"ইউসুফের গন্ধ পাচ্ছি।\" সবাই অবাক। জামা চোখে লাগাতেই দৃষ্টি ফিরল। তখন বললেন — \"আমি কি বলিনি — আমি আল্লাহ সম্পর্কে এমন জানি যা তোমরা জানো না?\"", "purpose": "দীর্ঘ অপেক্ষার পর বিশ্বাসের পুরস্কার। \"আমি জানতাম আল্লাহ ঠিক করবেন।\" আল্লাহর রহমত সম্পর্কে গভীর জ্ঞান ও আস্থার ফল", "learning": "আমাদের জন্য শিক্ষাআল্লাহর রহমতে বিশ্বাস রাখুন — একদিন বলতে পারবে let currentProphet = 0;
let currentDua = 0;

function getProphetLabel(name) {
  // Extract just the clean name part after the number and emoji
  // e.g. "001 🕌 নবী মুহাম্মদ ﷺ এর কুরআনিক দু'আ" → "নবী মুহাম্মদ ﷺ"
  const m = name.match(/^\d+\s*🕌\s*(নবী[^\n]+?)\s*এর/);
  if (m) return m[1].trim();
  return name.replace(/^\d+\s*🕌\s*/, '').trim();
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';
  DATA.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (i === currentProphet ? ' active' : '');
    item.onclick = () => selectProphet(i);
    const num = String(p.id).padStart(2, '0');
    item.innerHTML = `
      <span class="sidebar-num">${num}</span>
      <span class="sidebar-name">${getProphetLabel(p.name)}</span>
      <span class="sidebar-count">${p.duas.length}</span>
    `;
    list.appendChild(item);
  });
}

function selectProphet(i) {
  currentProphet = i;
  currentDua = 0;
  renderSidebar();
  // Scroll active into view
  const items = document.querySelectorAll('.sidebar-item');
  items[i]?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  renderCard();
}

function navigate(dir) {
  const p = DATA[currentProphet];
  const next = currentDua + dir;
  if (next < 0 || next >= p.duas.length) return;
  currentDua = next;
  renderCard();
}

function jumpToDua(i) {
  currentDua = i;
  renderCard();
}

function renderCard() {
  const p = DATA[currentProphet];
  const d = p.duas[currentDua];

  // Topbar
  document.getElementById('prophetNumber').textContent = `নবী ${String(p.id).padStart(3, '0')}`;
  document.getElementById('prophetTitle').textContent = p.name.replace(/^\d+\s*🕌\s*/, '');
  document.getElementById('duaCurrent').textContent = currentDua + 1;
  document.getElementById('duaTotal').textContent = p.duas.length;

  // Card
  const card = document.getElementById('duaCard');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';

  let infoHtml = '';

  if (d.situation) {
    infoHtml += `<div class="info-row">
      <div class="info-label">প্রেক্ষাপট</div>
      <div class="info-value">${d.situation}</div>
    </div>`;
  }
  if (d.purpose) {
    infoHtml += `<div class="info-row">
      <div class="info-label">উদ্দেশ্য</div>
      <div class="info-value">${d.purpose}</div>
    </div>`;
  }
  if (d.learning) {
    infoHtml += `<div class="info-row">
      <div class="info-label">শিক্ষা</div>
      <div class="info-value">${d.learning}</div>
    </div>`;
  }

  card.innerHTML = `
    <div class="card-title-row">
      <div class="card-dua-num">${d.dua_number}</div>
      <div class="card-title">${d.title || ''}</div>
      ${d.reference ? `<div class="card-ref">${d.reference}</div>` : ''}
    </div>
    <div class="arabic-block">
      <span class="arabic-text">${d.arabic || ''}</span>
      ${d.transliteration ? `<span class="transliteration">${d.transliteration}</span>` : ''}
    </div>
    <div class="info-grid">${infoHtml}</div>
  `;

  // Nav buttons
  document.getElementById('btnPrev').disabled = currentDua === 0;
  document.getElementById('btnNext').disabled = currentDua === p.duas.length - 1;

  // Progress dots
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  p.duas.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentDua ? ' active' : '');
    dot.onclick = () => jumpToDua(i);
    dot.title = `দু'আ ${i + 1}`;
    dots.appendChild(dot);
  });

  // Scroll card to top
  document.getElementById('cardArea').scrollTop = 0;
}

// keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

// Init
renderSidebar();
renderCard();
</script>
</body>
</html>
