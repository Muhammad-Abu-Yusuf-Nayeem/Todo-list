<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>দুআ সংকলন — Islamic Dua Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1208;
      --parchment: #f5ede0;
      --parchment-dark: #ede0cc;
      --gold: #b8860b;
      --gold-light: #d4a017;
      --gold-pale: #f0d890;
      --teal: #1a5c5c;
      --teal-light: #2a8080;
      --teal-pale: #d4eded;
      --rust: #7a2e0e;
      --cream: #fdf6ec;
      --border: rgba(184,134,11,0.25);
      --shadow: rgba(26,18,8,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(184,134,11,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(26,92,92,0.07) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b8860b' fill-opacity='0.03'%3E%3Cpath d='M30 0 L60 30 L30 60 L0 30z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      color: var(--ink);
      font-family: 'Noto Sans Bengali', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 56px 24px 40px;
      position: relative;
    }
    header::after {
      content: '';
      display: block;
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 24px auto 0;
    }

    .header-ornament {
      font-family: 'Scheherazade New', serif;
      font-size: 2.4rem;
      color: var(--gold);
      display: block;
      margin-bottom: 12px;
      opacity: 0.9;
      letter-spacing: 0.06em;
    }

    header h1 {
      font-family: 'Scheherazade New', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--teal);
      line-height: 1.3;
    }

    header p {
      font-size: 0.95rem;
      color: #6b5a40;
      margin-top: 8px;
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    /* ── CONTROLS ── */
    .controls {
      max-width: 1200px;
      margin: 0 auto 32px;
      padding: 0 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.7);
      font-family: 'Noto Sans Bengali', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      pointer-events: none;
    }

    .count-badge {
      font-size: 0.82rem;
      color: #6b5a40;
      background: var(--parchment);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── GRID ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 64px;
      display: grid;
      gap: 28px;
    }

    /* ── CARD ── */
    .dua-card {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 18px var(--shadow);
      backdrop-filter: blur(4px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      transition: box-shadow 0.25s, transform 0.25s;
      animation: fadeIn 0.4s ease both;
    }
    .dua-card:hover {
      box-shadow: 0 6px 32px rgba(26,18,8,0.16);
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LEFT: ARABIC ── */
    .arabic-col {
      padding: 28px 28px 28px 32px;
      /* background: linear-gradient(160deg, #1a5c5c 0%, #0e3d3d 100%); */
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }
    .arabic-col::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='40' r='35' fill='none' stroke='%23ffffff' stroke-width='0.4' stroke-opacity='0.06'/%3E%3Ccircle cx='40' cy='40' r='20' fill='none' stroke='%23ffffff' stroke-width='0.4' stroke-opacity='0.06'/%3E%3C/svg%3E") center/120px repeat;
      pointer-events: none;
    }

    .card-number {
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(212,160,23,0.8);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
      position: relative;
    }

    .arabic-title {
      font-family: 'Noto Sans Bengali', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gold-pale);
      margin-bottom: 14px;
      opacity: 0.85;
      position: relative;
    }

    .arabic-text {
      font-family: 'Scheherazade New', serif;
      font-size: clamp(1.5rem, 2.5vw, 1.7rem);
      font-weight: 600;
      color: #1d1717;
      line-height: 2.1;
      direction: rtl;
      text-align: right;
      flex: 1;
      position: relative;
    }

    .repeat-badge {
      display: inline-block;
      margin-top: 14px;
      font-size: 0.72rem;
      font-weight: 600;
      background: var(--gold);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      position: relative;
      align-self: flex-start;
    }

    /* ── RIGHT: MEANING + BENEFIT ── */
    .info-col {
      padding: 28px 28px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-left: 3px solid var(--gold-pale);
    }

    .info-section-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .info-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--gold-pale), transparent);
    }

    .meaning-text {
      font-size: 0.92rem;
      line-height: 1.85;
      color: #3a2c18;
      font-weight: 400;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .benefit-box {
      background: linear-gradient(135deg, rgba(212,237,237,0.4), rgba(240,216,144,0.2));
      border: 1px solid rgba(26,92,92,0.15);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .benefit-text {
      font-size: 0.88rem;
      line-height: 1.8;
      color: #1a3d3d;
      font-weight: 400;
    }
    .benefit-text::before {
      content: '✦ ';
      color: var(--gold);
      font-size: 0.7rem;
    }

    /* ── NO RESULTS ── */
    .no-results {
      text-align: center;
      padding: 60px 24px;
      color: #8a7060;
      font-size: 1rem;
      display: none;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.78rem;
      color: #8a7060;
      border-top: 1px solid var(--border);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .dua-card { grid-template-columns: 1fr; }
      .arabic-col { padding: 22px 20px; }
      .info-col { border-left: none; border-top: 3px solid var(--gold-pale); padding: 22px 20px; }
      .arabic-text { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <span class="header-ornament">﷽</span>
  <h1>দুআ সংকলন</h1>
  <p>Arabic • বাংলা অর্থ • উপকারিতা</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="দুআ খুঁজুন..." oninput="filterDuas()" />
  </div>
  <span class="count-badge" id="countBadge">৫৩টি দুআ</span>
</div>

<main id="duaGrid"></main>
<p class="no-results" id="noResults">কোনো দুআ পাওয়া যায়নি।</p>

<footer>সংকলিত দুআ ও আযকার — কুরআন ও সুন্নাহ থেকে</footer>

<script>
const duas = [
  {id:1,title:"আয়াতুল কুরসি",arabic:"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۚ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۚ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ",bangla_meaning:"আল্লাহ — তিনি ছাড়া কোনো ইলাহ নেই, তিনি চিরঞ্জীব, সর্বসত্তার ধারক। তাঁকে তন্দ্রা বা নিদ্রা স্পর্শ করে না। আসমান ও যমিনে যা কিছু আছে সবই তাঁর। কে আছে যে তাঁর অনুমতি ছাড়া তাঁর কাছে সুপারিশ করতে পারে? তাঁর কুরসি আসমান ও যমিন পরিবেষ্টন করে। তিনিই সর্বোচ্চ, সর্বমহান।",bangla_benefit:"ফজরের পর একবার পড়লে জান্নাতের পথ খুলে যায়। রাতে ঘুমানোর আগে পড়লে সকাল পর্যন্ত শয়তান থেকে সুরক্ষা পাওয়া যায়। প্রতিটি ফরয নামাযের পর পড়লে আল্লাহর হেফাজতে থাকা যায়।"},
  {id:2,title:"সূরা আল-কাফিরুন",arabic:"قُلْ يَا أَيُّهَا الْكَافِرُونَ (1) لَا أَعْبُدُ مَا تَعْبُدُونَ (2) وَلَا أَنتُمْ عَابِدُونَ مَا أَعْبُدُ (3) لَكُمْ دِينُكُمْ وَلِيَ دِينِ (6)",bangla_meaning:"বলো: হে কাফিরগণ! আমি তার ইবাদত করি না যার ইবাদত তোমরা করো। তোমরাও তার ইবাদতকারী নও যার ইবাদত আমি করি। তোমাদের জন্য তোমাদের দ্বীন এবং আমার জন্য আমার দ্বীন।",bangla_benefit:"এই সূরাকে 'শিরক-মুক্তির সূরা' বলা হয়। রাতে ঘুমানোর আগে পড়লে শিরক থেকে মুক্তি পাওয়া যায়। এটি এক-চতুর্থাংশ কুরআনের সমতুল্য।"},
  {id:3,title:"সূরা আল-ইখলাস",arabic:"قُلْ هُوَ اللَّهُ أَحَدٌ (1) اللَّهُ الصَّمَدُ (2) لَمْ يَلِدْ وَلَمْ يُولَدْ (3) وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ (4)",bangla_meaning:"বলো: তিনিই আল্লাহ, একক। আল্লাহ অমুখাপেক্ষী। তিনি জন্ম দেননি এবং জন্মগ্রহণও করেননি। এবং তাঁর সমতুল্য কেউ নেই।",bangla_benefit:"এই সূরা এক-তৃতীয়াংশ কুরআনের সমান। দিনে তিনবার পড়লে সম্পূর্ণ কুরআন একবার পড়ার সওয়াব পাওয়া যায়। আল্লাহর ভালোবাসা ও জান্নাতের নিশ্চয়তা লাভ করা যায়।"},
  {id:4,title:"সূরা আল-ফালাক",arabic:"قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ (1) مِن شَرِّ مَا خَلَقَ (2) وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ (3) وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ (4) وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ (5)",bangla_meaning:"বলো: আমি আশ্রয় নিচ্ছি ভোরের প্রভুর কাছে। তাঁর সৃষ্টির অনিষ্ট থেকে। অন্ধকার রাতের অনিষ্ট থেকে যখন তা ছেয়ে যায়। গ্রন্থিতে ফুঁদানেওয়ালাদের অনিষ্ট থেকে। এবং হিংসুকের অনিষ্ট থেকে।",bangla_benefit:"যাদু, কুদৃষ্টি ও হিংসা থেকে রক্ষা করে। সকাল-সন্ধ্যায় তিনবার পড়লে সব ধরনের ক্ষতি থেকে মুক্তি মেলে। রাসূল (সা.) প্রতিদিন এই সূরা পড়তেন।"},
  {id:5,title:"সূরা আন-নাস",arabic:"قُلْ أَعُوذُ بِرَبِّ النَّاسِ (1) مَلِكِ النَّاسِ (2) إِلَٰهِ النَّاسِ (3) مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ (4) الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ (5) مِنَ الْجِنَّةِ وَالنَّاسِ (6)",bangla_meaning:"বলো: আমি আশ্রয় নিচ্ছি মানুষের প্রতিপালকের কাছে। মানুষের অধিপতির কাছে। মানুষের ইলাহর কাছে। কুমন্ত্রণাদাতার অনিষ্ট থেকে যে মানুষের বুকে কুমন্ত্রণা দেয়। জিন ও মানুষের মধ্য থেকে।",bangla_benefit:"শয়তানের কুমন্ত্রণা ও খারাপ চিন্তা থেকে রক্ষা করে। আল-ফালাকের সাথে সকাল-সন্ধ্যায় পড়লে সব ক্ষতি থেকে পরিপূর্ণ সুরক্ষা পাওয়া যায়।"},
  {id:6,title:"শক্তিশালী জিকির (তাহলিল)",arabic:"لَا إِلٰهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيْكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",bangla_meaning:"আল্লাহ ছাড়া কোনো ইলাহ নেই, তিনি এক, তাঁর কোনো শরিক নেই। রাজত্ব তাঁরই, সকল প্রশংসা তাঁরই এবং তিনি সবকিছুর উপর ক্ষমতাশালী।",bangla_benefit:"এই জিকির ১০ বার পড়লে ইসমাইল (আ.)-এর বংশ থেকে ৪ জন ক্রীতদাস মুক্ত করার সমান সওয়াব মেলে। ১০০ বার পড়লে ১০০ নেকি লেখা হয় এবং ১০০ গুনাহ মাফ হয়।",repeat:"৩X"},
  {id:7,title:"আল্লাহর উপর ভরসা",arabic:"حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ",bangla_meaning:"আল্লাহই আমাদের জন্য যথেষ্ট, আর তিনি কতই না উত্তম কার্যসম্পাদনকারী।",bangla_benefit:"কঠিন পরিস্থিতিতে আল্লাহর উপর তাওয়াক্কুল করার দুআ। ইবরাহিম (আ.) আগুনে নিক্ষিপ্ত হওয়ার সময় এই দুআ পড়েছিলেন।",repeat:"৭X"},
  {id:8,title:"ক্ষতি থেকে সুরক্ষা",arabic:"بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ",bangla_meaning:"আল্লাহর নামে, যাঁর নামের সাথে আসমান ও যমিনে কোনো কিছুই ক্ষতি করতে পারে না, আর তিনি সর্বশ্রোতা, সর্বজ্ঞ।",bangla_benefit:"সকাল ও সন্ধ্যায় তিনবার পড়লে সারাদিন ও সারারাত সব ক্ষতি থেকে সুরক্ষিত থাকা যায়।",repeat:"৩X"},
  {id:9,title:"জাহান্নামের আজাব থেকে মুক্তির দুআ",arabic:"اللَّهُم َّ أَجِرْنِي مِن َ النَّار",bangla_meaning:"হে আল্লাহ! আমাকে জাহান্নামের আজাব থেকে মুক্তি দিন।",bangla_benefit:"ফজর ও মাগরিবের পর সাতবার পড়লে আল্লাহ তাকে জাহান্নাম থেকে মুক্তি দেন বলে হাদিসে বর্ণিত হয়েছে।",repeat:"৭X"},
  {id:10,title:"সন্তুষ্টির দুআ",arabic:"رَضِيتُ بِاللَّهِ رَبًّا وَبِالْإِسْلَامِ دِينًا وَبِمُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ نَبِيًّا",bangla_meaning:"আমি সন্তুষ্ট আল্লাহকে আমার রব হিসেবে, ইসলামকে আমার দ্বীন হিসেবে এবং মুহাম্মাদ (সা.)-কে আমার নবী হিসেবে।",bangla_benefit:"সকালে তিনবার পড়লে আল্লাহ তা'আলা কিয়ামতের দিন সন্তুষ্ট করার দায়িত্ব নিয়ে নেন। ঈমান মজবুত করে এবং অন্তরে প্রশান্তি আনে।",repeat:"৩X"},
  {id:11,title:"কুদৃষ্টি ও ক্ষতি থেকে সুরক্ষা",arabic:"أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّةِ مِن شَرِّ مَا خَلَقَ",bangla_meaning:"আমি আল্লাহর পরিপূর্ণ কালিমাসমূহের আশ্রয় নিচ্ছি তাঁর সৃষ্টির যাবতীয় অনিষ্ট থেকে।",bangla_benefit:"সন্ধ্যায় তিনবার পড়লে সকাল পর্যন্ত সাপের কামড় ও সকল ক্ষতি থেকে সুরক্ষিত থাকা যায়। কুদৃষ্টি ও যাদু থেকে রক্ষা পাওয়া যায়।",repeat:"৭X"},
  {id:12,title:"ক্ষমা ও রহমত চাওয়ার দুআ",arabic:"رَبِّ اغْفِرْ لِي وَارْحَمْنِي وَهْدِنِي وَجَبْرِني وَعَافِنِي وَرَزُقْنِي",bangla_meaning:"হে আমার প্রতিপালক! আমাকে ক্ষমা করুন, আমার উপর রহম করুন, আমাকে হেদায়াত দিন, আমার ক্ষতি পূরণ করুন, আমাকে সুস্থ রাখুন এবং আমাকে রিযিক দিন।",bangla_benefit:"এই দুআয় ছয়টি গুরুত্বপূর্ণ আবেদন একত্রে করা হয়েছে। নিয়মিত পাঠে গুনাহ মাফ, হেদায়াত, সুস্বাস্থ্য ও হালাল রিযিক লাভ হয়।",repeat:"৭X"},
  {id:13,title:"দুশ্চিন্তা ও দুঃখ থেকে সুরক্ষা",arabic:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ وَالْعَجْزِ وَالْكَسَلِ وَالْبُخْلِ وَالْجُبْنِ وَذَلَّةِ الدَّيْنِ وَغَلَبَةِ الرِّجَالِ",bangla_meaning:"হে আল্লাহ! আমি তোমার কাছে আশ্রয় চাই দুশ্চিন্তা, দুঃখ, অক্ষমতা, অলসতা, কৃপণতা, কাপুরুষতা, ঋণের বোঝা এবং মানুষের কাছে পরাজিত হওয়া থেকে।",bangla_benefit:"মানসিক শান্তি ও আত্মবিশ্বাস ফিরিয়ে আনে। আর্থিক সংকট ও ঋণের চাপ থেকে মুক্তি পেতে সাহায্য করে। রাসূল (সা.) নিয়মিত এই দুআ পড়তেন।",repeat:"৩X"},
  {id:14,title:"তাসবিহ (চার বাক্য)",arabic:"سُبْحَانَ اللهِ ، وَالْحَمْدُ لِلهِ وَلَا إِلٰهَ إِلَّا اللهُ ، وَاللهُ أَكْبَرُ",bangla_meaning:"আল্লাহ পবিত্র, সমস্ত প্রশংসা আল্লাহর, আল্লাহ ছাড়া কোনো ইলাহ নেই এবং আল্লাহ সবচেয়ে বড়।",bangla_benefit:"নামাযের পর ৩৩ বার করে পড়া সুন্নাত। পাপ সমুদ্রের ফেনার মতো বেশি হলেও মাফ হয়ে যায়।",repeat:"৩৩X"},
  {id:15,title:"সুবহানাল্লাহি ওয়াবিহামদিহি",arabic:"سُبْحَانَ اللهِ وَبِحَمْدِهِ ، سُبْحَانَ اللهِ الْعَظِيْم",bangla_meaning:"আল্লাহর পবিত্রতা ঘোষণা করি এবং তাঁর প্রশংসা করি; মহান আল্লাহর পবিত্রতা ঘোষণা করি।",bangla_benefit:"মুখে হালকা কিন্তু মিযানে ভারী এবং আল্লাহর কাছে অত্যন্ত প্রিয়। দিনে ১০০ বার পড়লে গুনাহ মাফ হয়, যদিও তা সমুদ্রের ফেনার মতো বেশি হয়।",repeat:"১০০X"},
  {id:16,title:"ইয়া জাল-জালালি ওয়াল-ইকরাম",arabic:"يَا ذَا الْجَلَالِ وَالْإِكْرَامِ",bangla_meaning:"হে মহিমা ও সম্মানের অধিকারী!",bangla_benefit:"আল্লাহর মহিমা ও সম্মানের স্বীকৃতি প্রদানকারী এই জিকির নিয়মিত পাঠে দুআ কবুল হওয়ার সম্ভাবনা বাড়ে।",repeat:"৩৩X"},
  {id:17,title:"ইয়া হাইয়্যু ইয়া কাইয়্যুম",arabic:"يَا حَيُّ يَا قَيُّوْمُ ، بِرَحْمَتِكَ أَسْتَغِيْثُ",bangla_meaning:"হে চিরঞ্জীব! হে সর্বসত্তার ধারক! তোমার রহমতের মাধ্যমে আমি সাহায্য চাই।",bangla_benefit:"বিপদ-আপদে এবং কঠিন পরিস্থিতিতে এই দুআ পড়লে আল্লাহর রহমত নেমে আসে। বিষণ্নতা ও দুশ্চিন্তা দূর করে।",repeat:"৭X"},
  {id:18,title:"দুআ ইউনুস",arabic:"لَآ إِلٰهَ إِلَّآ أَنْتَ سُبۡحٰنَكَ إِنِّيْ كُنْتُ مِنَ الظّٰلِمِيْنَ",bangla_meaning:"তুমি ছাড়া কোনো ইলাহ নেই, তুমি পবিত্র, নিশ্চয়ই আমি ছিলাম জালিমদের অন্তর্ভুক্ত।",bangla_benefit:"ইউনুস (আ.) মাছের পেটে থাকা অবস্থায় এই দুআ পড়েছিলেন এবং আল্লাহ তাঁকে মুক্তি দিয়েছিলেন। যেকোনো কঠিন বিপদ থেকে মুক্তির জন্য অত্যন্ত কার্যকর।",repeat:"৭X"},
  {id:19,title:"ইস্তিগফার",arabic:"أَسْتَغْفِرُ اللهَ الْعَظِيْمَ الَّذِيْ لَا إِلٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّوْمُ ، وَأَتُوْبُ إِلَيْهِ",bangla_meaning:"আমি মহান আল্লাহর কাছে ক্ষমা চাই, যিনি ছাড়া কোনো ইলাহ নেই, যিনি চিরঞ্জীব, সর্বসত্তার ধারক, এবং আমি তাঁর কাছে তাওবা করি।",bangla_benefit:"এই ইস্তিগফার নিয়মিত পড়লে গুনাহ মাফ হয়। এটি তাওবা কবুলের একটি বিশেষ উপায়। প্রতিদিন সকাল ও সন্ধ্যায় পড়া উচিত।",repeat:"৭X"},
  {id:20,title:"নিজের ভুল স্বীকারের দুআ",arabic:"رَبِّ إِنِّي ظَلَمْتُ نَفْسِي فَاغْفِرْ لِي",bangla_meaning:"হে আমার প্রতিপালক! আমি নিজের উপর জুলুম করেছি, তাই আমাকে ক্ষমা করুন।",bangla_benefit:"নিজের ভুল স্বীকার করে আল্লাহর কাছে ক্ষমা চাওয়ার এই দুআ অত্যন্ত কার্যকর। মুসা (আ.) এই দুআ পড়েছিলেন।",repeat:"৭X"},
  {id:21,title:"ক্ষমা ও রহমতের দুআ",arabic:"أَنْتَ وَلِيُّنَا فَاغْفِرْ لَنَا وَارْحَمْنَا ۖ وَأَنْتَ خَيْرُ الْغَافِرِينَ",bangla_meaning:"তুমিই আমাদের অভিভাবক, সুতরাং আমাদের ক্ষমা করো এবং আমাদের প্রতি রহম করো। তুমিই সর্বোত্তম ক্ষমাকারী।",bangla_benefit:"গুনাহ মাফের জন্য একটি কুরআনিক দুআ। আল্লাহর অনুগ্রহ ও ক্ষমা লাভের আশায় নিয়মিত পড়া উচিত।"},
  {id:22,title:"ক্ষমা চাওয়া — ঈমানদারের দুআ",arabic:"رَبَّنَا إِنَّنَا آمَنَّا فَاغْفِرْ لَنَا ذُنُوبَنَا وَقِنَا عَذَابَ النَّارِ",bangla_meaning:"হে আমাদের প্রতিপালক! আমরা ঈমান এনেছি, সুতরাং আমাদের গুনাহ মাফ করুন এবং আমাদের জাহান্নামের আজাব থেকে রক্ষা করুন।",bangla_benefit:"ঈমানদারের পক্ষ থেকে ক্ষমা ও জাহান্নাম থেকে মুক্তির কুরআনিক দুআ। বিশেষত রাতের নামাযে এই দুআ পাঠ করা উত্তম।"},
  {id:23,title:"রহমত কামনার দুআ",arabic:"رَبَّنَا آمَنَّا فَاغْفِرْ لَنَا وَارْحَمْنَا وَأَنْتَ خَيْرُ الرَّاحِمِينَ",bangla_meaning:"হে আমাদের প্রতিপালক! আমরা ঈমান এনেছি, তাই আমাদের ক্ষমা করুন এবং আমাদের উপর রহম করুন। তুমিই সর্বোত্তম দয়ালু।",bangla_benefit:"আল্লাহর ক্ষমা ও রহমত একসাথে চাওয়ার একটি সুন্দর দুআ। কুরআন থেকে নেওয়া এই দুআ পাঠে আল্লাহর বিশেষ অনুগ্রহ লাভ হয়।"},
  {id:24,title:"ক্ষমা ও রহমতের সংক্ষিপ্ত দুআ",arabic:"رَبِّ اغْفِرْ وَارْحَمْ وَأَنْتَ خَيْرُ الرَّاحِمِينَ",bangla_meaning:"হে আমার প্রতিপালক! ক্ষমা করুন এবং রহম করুন। আপনিই সর্বোত্তম দয়ালু।",bangla_benefit:"সংক্ষিপ্ত কিন্তু অত্যন্ত হৃদয়গ্রাহী এই দুআ যেকোনো সময় পড়া যায়।"},
  {id:25,title:"না জেনে চাওয়া থেকে বিরত থাকার দুআ",arabic:"رَبِّ إِنِّي أَعُوذُ بِكَ أَنْ أَسْأَلَكَ مَا لَيْسَ لِي بِهِ عِلْمٌ ۖ وَإِلَّا تَغْفِرْ لِي وَتَرْحَمْنِي أَكُنْ مِنَ الْخَاسِرِينَ",bangla_meaning:"হে আমার প্রতিপালক! আমি তোমার কাছে আশ্রয় নিচ্ছি এমন কিছু চাওয়া থেকে যার জ্ঞান আমার নেই। যদি তুমি আমাকে ক্ষমা না করো ও রহম না করো তাহলে আমি ক্ষতিগ্রস্তদের অন্তর্ভুক্ত হয়ে যাবো।",bangla_benefit:"নূহ (আ.) এর দুআ। অহংকার ও অজ্ঞতা থেকে বিনম্রতার দিকে ফেরার দুআ। আল্লাহর সিদ্ধান্তে সন্তুষ্ট থাকার শিক্ষা দেয়।"},
  {id:26,title:"নূর পূর্ণ করার দুআ",arabic:"رَبَّنَا أَتْمِمْ لَنَا نُورَنَا وَاغْفِرْ لَنَا ۖ إِنَّكَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ",bangla_meaning:"হে আমাদের প্রতিপালক! আমাদের নূর পূর্ণ করুন এবং আমাদের ক্ষমা করুন। নিশ্চয়ই তুমি সবকিছুর উপর ক্ষমতাশালী।",bangla_benefit:"কিয়ামতের দিন ঈমানদারদের নূর সম্পূর্ণ করার জন্য এই দুআ পড়া হয়। অন্তরে আলো ও হেদায়াত লাভের দুআ।"},
  {id:27,title:"জান্নাতে ঘর চাওয়ার দুআ",arabic:"رَبِّ ابْنِ لِي عِنْدَكَ بَيْتًا فِي الْجَنَّةِ",bangla_meaning:"হে আমার প্রতিপালক! তোমার নিকট জান্নাতে আমার জন্য একটি ঘর তৈরি করে দিন।",bangla_benefit:"ফেরআউনের স্ত্রী আসিয়া (রা.) এই দুআ পড়েছিলেন। জান্নাতে বাসস্থান লাভের জন্য নিয়মিত এই দুআ পড়া উচিত।"},
  {id:28,title:"জাহান্নাম থেকে মুক্তির দুআ",arabic:"رَبَّنَا اصْرِفْ عَنَّا عَذَابَ جَهَنَّمَ ۖ إِنَّ عَذَابَهَا كَانَ غَرَامًا. إِنَّهَا سَاءَتْ مُسْتَقَرًّا وَمُقَامًا",bangla_meaning:"হে আমাদের প্রতিপালক! আমাদের থেকে জাহান্নামের আজাব দূর করুন। নিশ্চয়ই তার আজাব স্থায়ী ও ধ্বংসাত্মক।",bangla_benefit:"জাহান্নামের ভয় ও জান্নাতের আকাঙ্ক্ষা তৈরি করে। নিয়মিত পাঠে পাপ থেকে বিরত থাকার অনুপ্রেরণা মেলে।"},
  {id:29,title:"ক্ষমা ও জান্নাত চাওয়ার দীর্ঘ দুআ",arabic:"رَبَّنَا مَا خَلَقْتَ هَٰذَا بَاطِلًا سُبْحَانَكَ فَقِنَا عَذَابَ النَّارِ. رَبَّنَا إِنَّنَا سَمِعْنَا مُنَادِيًا يُنَادِي لِلْإِيمَانِ أَنْ آمِنُوا بِرَبِّكُمْ فَآمَنَّا ۚ رَبَّنَا فَاغْفِرْ لَنَا ذُنُوبَنَا وَتَوَفَّنَا مَعَ الْأَبْرَارِ",bangla_meaning:"হে আমাদের প্রতিপালক! তুমি এসব অনর্থক সৃষ্টি করোনি, তুমি পবিত্র, আমাদের জাহান্নামের আজাব থেকে রক্ষা করো। আমরা ঈমানের আহ্বান শুনেছি এবং ঈমান এনেছি। হে আমাদের রব, আমাদের গুনাহ মাফ করুন এবং নেককারদের সাথে আমাদের মৃত্যু দিন।",bangla_benefit:"সূরা আলে-ইমরানের বিখ্যাত দুআ। গভীর চিন্তাশীল মুমিনদের দুআ হিসেবে পরিচিত। ঈমান মজবুত করে এবং আখিরাতের চিন্তা জাগিয়ে তোলে।"},
  {id:30,title:"তাওবাকারীদের জন্য ফেরেশতাদের দুআ",arabic:"رَبَّنَا وَسِعْتَ كُلَّ شَيْءٍ رَحْمَةً وَعِلْمًا فَاغْفِرْ لِلَّذِينَ تَابُوا وَاتَّبَعُوا سَبِيلَكَ وَقِهِمْ عَذَابَ الْجَحِيمِ",bangla_meaning:"হে আমাদের প্রতিপালক! তোমার রহমত ও জ্ঞান সবকিছু পরিব্যাপ্ত, তাই যারা তাওবা করেছে ও তোমার পথ অনুসরণ করেছে তাদের ক্ষমা করো।",bangla_benefit:"ফেরেশতাদের এই দুআ কুরআনে উল্লিখিত। তাওবাকারীদের জন্য বিশেষভাবে কার্যকর। আল্লাহর রহমতের বিশালতার স্বীকৃতি।"},
  {id:31,title:"হিকমত ও জান্নাতের দুআ (ইবরাহিম আ.)",arabic:"رَبِّ هَبْ لِي حُكْمًا وَأَلْحِقْنِي بِالصَّالِحِينَ. وَاجْعَلْ لِي لِسَانَ صِدْقٍ فِي الْآخِرِينَ. وَاجْعَلْنِي مِنْ وَرَثَةِ جَنَّةِ النَّعِيمِ",bangla_meaning:"হে আমার প্রতিপালক! আমাকে প্রজ্ঞা দান করুন এবং নেককারদের সাথে মিলিয়ে দিন। আমাকে জান্নাতুন নাঈমের উত্তরাধিকারীদের মধ্যে শামিল করুন।",bangla_benefit:"ইবরাহিম (আ.) এর দুআ। জ্ঞান-প্রজ্ঞা, সৎ সঙ্গ ও জান্নাত লাভের জন্য এই দুআ অত্যন্ত গুরুত্বপূর্ণ।"},
  {id:32,title:"নামায ও মাগফিরাতের দুআ",arabic:"رَبِّ اجْعَلْنِي مُقِيمَ الصَّلَاةِ وَمِنْ ذُرِّيَّتِي ۚ رَبَّنَا وَتَقَبَّلْ دُعَاءِ. رَبَّنَا اغْفِرْ لِي وَلِوَالِدَيَّ وَلِلْمُؤْمِنِينَ",bangla_meaning:"হে আমার প্রতিপালক! আমাকে এবং আমার সন্তানদের নামায প্রতিষ্ঠাকারী বানিয়ে দিন। হে আমাদের প্রতিপালক! আমাকে, আমার পিতামাতাকে ও সকল মুমিনদের ক্ষমা করুন।",bangla_benefit:"ইবরাহিম (আ.) এর দুআ। পরিবারের সকলের ইসলামের উপর দৃঢ় থাকার জন্য এই দুআ অত্যন্ত গুরুত্বপূর্ণ।"},
  {id:33,title:"নেক সন্তানের দুআ",arabic:"رَبِّ هَبْ لِي مِنْ لَدُنْكَ ذُرِّيَّةً طَيِّبَةً ۖ إِنَّكَ سَمِيعُ الدُّعَاءِ",bangla_meaning:"হে আমার প্রতিপালক! তোমার পক্ষ থেকে আমাকে পবিত্র সন্তান দান করুন। নিশ্চয়ই তুমি দুআ শুনতে পাও।",bangla_benefit:"জাকারিয়া (আ.) এর দুআ। নেক ও সালেহ সন্তানের জন্য প্রার্থনাকারীদের জন্য অত্যন্ত কার্যকর। বিশেষত নিঃসন্তানদের জন্য গুরুত্বপূর্ণ।"},
  {id:34,title:"পরিবারের শান্তির দুআ",arabic:"رَبَّنَا هَبْ لَنَا مِنْ أَزْوَاجِنَا وَذُرِّيَّاتِنَا قُرَّةَ أَعْيُنٍ وَاجْعَلْنَا لِلْمُتَّقِينَ إِمَامًا",bangla_meaning:"হে আমাদের প্রতিপালক! আমাদের স্ত্রী ও সন্তানদের আমাদের চোখের শীতলতা বানিয়ে দিন এবং আমাদের মুত্তাকিদের নেতা বানান।",bangla_benefit:"পারিবারিক সুখ-শান্তি ও নেতৃত্বের গুণ লাভের দুআ। পরিবারে ভালোবাসা ও সম্প্রীতি বজায় রাখতে সাহায্য করে।"},
  {id:35,title:"নিয়ামতের শুকরিয়া ও নেক আমলের দুআ",arabic:"رَبِّ أَوْزِعْنِي أَنْ أَشْكُرَ نِعْمَتَكَ الَّتِي أَنْعَمْتَ عَلَيَّ وَعَلَىٰ وَالِدَيَّ وَأَنْ أَعْمَلَ صَالِحًا تَرْضَاهُ",bangla_meaning:"হে আমার প্রতিপালক! আমাকে তোমার নিয়ামতের শুকরিয়া আদায় করার তাওফিক দাও যা তুমি আমার ও আমার পিতামাতার উপর দিয়েছো এবং আমাকে এমন নেক আমল করার সুযোগ দাও যা তুমি পছন্দ করো।",bangla_benefit:"কৃতজ্ঞতা ও নেক আমলের তাওফিক চাওয়ার সুন্দর দুআ। পিতামাতার প্রতি কৃতজ্ঞতার অনুভূতি তৈরি করে।"},
  {id:36,title:"শয়তানের কুমন্ত্রণা থেকে সুরক্ষা",arabic:"رَبِّ أَعُوذُ بِكَ مِنْ هَمَزَاتِ الشَّيَاطِينِ",bangla_meaning:"হে আমার প্রতিপালক! আমি তোমার কাছে শয়তানদের কুমন্ত্রণা থেকে আশ্রয় চাই।",bangla_benefit:"শয়তানের ধোঁকা ও খারাপ চিন্তা থেকে রক্ষা পেতে কার্যকর। যেকোনো কাজ শুরু করার আগে পড়লে শয়তানের প্রভাব কম থাকে।"},
  {id:37,title:"ক্ষমা ও সহজতার দুআ",arabic:"رَبَّنَا لَا تُؤَاخِذْنَا إِنْ نَسِينَا أَوْ أَخْطَأْنَا ۚ رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ ۖ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا ۚ أَنْتَ مَوْلَانَا فَانْصُرْنَا",bangla_meaning:"হে আমাদের প্রতিপালক! ভুলে গেলে বা ভুল করলে আমাদের পাকড়াও করো না। আমাদের এমন বোঝা বহন করিও না যা বহন করার সাধ্য আমাদের নেই। আমাদের ক্ষমা করো, মাফ করো, রহম করো। তুমিই আমাদের মনিব।",bangla_benefit:"সূরা বাকারার শেষ দুআ। এটি প্রতিরাতে পড়া মুস্তাহাব। অজান্তে হওয়া গুনাহ মাফ হয় এবং কঠিন পরিস্থিতিতে সাহায্য পাওয়া যায়।"},
  {id:38,title:"ক্ষমা ও বিজয়ের দুআ",arabic:"رَبَّنَا اغْفِرْ لَنَا ذُنُوبَنَا وَإِسْرَافَنَا فِي أَمْرِنَا وَثَبِّتْ أَقْدَامَنَا وَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ",bangla_meaning:"হে আমাদের প্রতিপালক! আমাদের গুনাহ ও কাজে সীমালঙ্ঘন মাফ করুন। আমাদের পদ স্থির রাখুন এবং কাফিরদের বিরুদ্ধে আমাদের সাহায্য করুন।",bangla_benefit:"কঠিন সময়ে অটল থাকার ও শত্রুর উপর বিজয়ের দুআ। গুনাহ থেকে মুক্তি ও সাহসিকতার জন্য পড়া উচিত।"},
  {id:39,title:"ধৈর্য ও বিজয়ের দুআ",arabic:"رَبَّنَا أَفْرِغْ عَلَيْنَا صَبْرًا وَثَبِّتْ أَقْدَامَنَا وَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ",bangla_meaning:"হে আমাদের প্রতিপালক! আমাদের উপর পরিপূর্ণ ধৈর্য ঢেলে দিন, আমাদের পা স্থির রাখুন এবং কাফিরদের বিরুদ্ধে আমাদের সাহায্য করুন।",bangla_benefit:"জালুতের বিরুদ্ধে যুদ্ধে মুমিনরা এই দুআ করেছিল। কঠিন পরিস্থিতিতে ধৈর্য ও স্থিরতার জন্য বিশেষ কার্যকর।"},
  {id:40,title:"লুত (আ.)-এর দুআ",arabic:"رَبِّ انْصُرْنِي عَلَى الْقَوْمِ الْمُفْسِدِينَ",bangla_meaning:"হে আমার প্রতিপালক! ফাসাদকারীদের বিরুদ্ধে আমাকে সাহায্য করুন।",bangla_benefit:"অন্যায়কারী ও দুর্নীতিবাজদের বিরুদ্ধে আল্লাহর সাহায্য চাওয়ার দুআ। সত্য ও ন্যায়ের পথে লড়াইয়ে অনুপ্রেরণা দেয়।"},
  {id:41,title:"জালিমদের থেকে সুরক্ষা",arabic:"رَبَّنَا لَا تَجْعَلْنَا مَعَ الْقَوْمِ الظَّالِمِينَ رَبَّنَا لَا تَجْعَلْنَا فِتْنَةً لِلْقَوْمِ الظَّالِمِينَ. وَنَجِّنَا بِرَحْمَتِكَ مِنَ الْقَوْمِ الْكَافِرِينَ",bangla_meaning:"হে আমাদের প্রতিপালক! আমাদের জালিমদের দলভুক্ত করো না। আমাদের জালিমদের জন্য ফিতনার বিষয় করো না। তোমার রহমতে কাফিরদের থেকে আমাদের মুক্তি দাও।",bangla_benefit:"অন্যায় ও জুলুম থেকে নিজেকে রক্ষার দুআ। মুসা (আ.) এই দুআ করেছিলেন।"},
  {id:42,title:"নির্যাতন থেকে সুরক্ষা",arabic:"رَبَّنَا عَلَيْكَ تَوَكَّلْنَا وَإِلَيْكَ أَنَبْنَا وَإِلَيْكَ الْمَصِيرُ. رَبَّنَا لَا تَجْعَلْنَا فِتْنَةً لِلَّذِينَ كَفَرُوا وَاغْفِرْ لَنَا رَبَّنَا",bangla_meaning:"হে আমাদের প্রতিপালক! তোমার উপর ভরসা করলাম, তোমার দিকেই রুজু করলাম। হে আমাদের রব, আমাদের কাফিরদের জন্য ফিতনার কারণ করো না এবং আমাদের ক্ষমা করো।",bangla_benefit:"ইবরাহিম (আ.) ও তাঁর সঙ্গীদের দুআ। সর্বাবস্থায় আল্লাহর উপর ভরসা রাখা এবং শত্রুর হাত থেকে মুক্তির জন্য পড়া উচিত।"},
  {id:43,title:"আইয়্যুব (আ.)-এর দুআ",arabic:"رَبِّ – أَنِّيْ مَسَّنِيَ الضُّرُّ وَأَنْتَ أَرْحَمُ الرَّاحِمِيْنَ",bangla_meaning:"হে আমার প্রতিপালক! আমি কষ্টে পড়েছি, আর তুমিই সর্বাধিক দয়ালু।",bangla_benefit:"আইয়্যুব (আ.) কঠিন রোগ ও বিপদে এই দুআ পড়েছিলেন এবং আল্লাহ তাঁকে সুস্থ করেছিলেন।"},
  {id:44,title:"মুসলিম হিসেবে মৃত্যুর দুআ",arabic:"اَللّٰهُمَّ يَا – فَاطِرَ السَّمٰوَاتِ وَالْأَرْضِ أَنْتَ وَلِـيِّيْ فِي الدُّنْيَا وَالْآخِرَةِ تَوَفَّنِيْ مُسْلِمًا وَّأَلْحِقْنِيْ بِالصَّالِحِيْنَ",bangla_meaning:"হে আল্লাহ! হে আসমান ও যমিনের সৃষ্টিকর্তা! তুমিই দুনিয়া ও আখিরাতে আমার অভিভাবক। আমাকে মুসলিম অবস্থায় মৃত্যু দাও এবং নেককারদের সাথে মিলিয়ে দাও।",bangla_benefit:"ইউসুফ (আ.) এর দুআ। ঈমানের সাথে মৃত্যু এবং নেককারদের সাথে থাকার জন্য অত্যন্ত গুরুত্বপূর্ণ দুআ।"},
  {id:45,title:"আমল কবুলের দুআ",arabic:"رَبَّنَا تَقَبَّلْ مِنَّا ۖ إِنَّكَ أَنْتَ السَّمِيعُ الْعَلِيمُ. وَتُبْ عَلَيْنَا ۖ إِنَّكَ أَنْتَ التَّوَّابُ الرَّحِيمُ",bangla_meaning:"হে আমাদের প্রতিপালক! আমাদের থেকে কবুল করো। নিশ্চয়ই তুমি সর্বশ্রোতা, সর্বজ্ঞ। আমাদের তাওবা কবুল করো, নিশ্চয়ই তুমি তাওবা গ্রহণকারী, দয়ালু।",bangla_benefit:"ইবরাহিম (আ.) ও ইসমাইল (আ.) কা'বা নির্মাণের সময় এই দুআ করেছিলেন। যেকোনো নেক আমলের পর পড়লে আমল কবুল হওয়ার আশা বাড়ে।"},
  {id:46,title:"সাইয়্যিদুল ইস্তিগফার",arabic:"اَللّٰهُمَّ أَنْتَ رَبِّيْ لَا إِلٰهَ إِلَّا أَنْتَ ، خَلَقْتَنِيْ وَأَنَا عَبْدُكَ ، أَعُوْذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ ، أَبُوْءُ لَكَ بِنِعْمَتِكَ عَلَيَّ وَأَبُوْءُ لَكَ بِذَنْبِيْ ، فَاغْفِرْ لِيْ فَإِنَّهُ لَا يَغْفِرُ الذُّنُوْبَ إِلَّا أَنْتَ",bangla_meaning:"হে আল্লাহ! তুমিই আমার রব, তুমি ছাড়া কোনো ইলাহ নেই। তুমি আমাকে সৃষ্টি করেছ, আমি তোমার বান্দা। আমি আমার কৃতকর্মের অনিষ্ট থেকে তোমার আশ্রয় চাই। আমি তোমার নিয়ামত ও আমার পাপ উভয়ই স্বীকার করি। তাই আমাকে মাফ করে দাও।",bangla_benefit:"ইস্তিগফারের সর্বশ্রেষ্ঠ দুআ। সকালে পড়ে মারা গেলে জান্নাতি এবং সন্ধ্যায় পড়ে রাতে মারা গেলেও জান্নাতি — হাদিসে বর্ণিত।"},
  {id:47,title:"চারটি মন্দ থেকে সুরক্ষা",arabic:"اَللّٰهُمَّ عَالِمَ الْغَيْبِ وَالشَّهَادَةِ ، فَاطِرَ السَّمٰوَاتِ وَالْأَرْضِ ، أَشْهَدُ أَنْ لَّا إِلٰهَ إِلَّا أَنْتَ ، أَعُوْذُ بِكَ مِنْ شَرِّ نَفْسِيْ ، وَمِنْ شَرِّ الشَّيْطَانِ وَشِرْكِهِ",bangla_meaning:"হে আল্লাহ! হে গায়েব ও উপস্থিতের জ্ঞানী, আসমান ও যমিনের সৃষ্টিকর্তা! আমি আমার নফসের অনিষ্ট থেকে, শয়তান ও তার শিরক থেকে, কোনো মুসলিমকে কষ্ট দেওয়া থেকে তোমার আশ্রয় চাই।",bangla_benefit:"ঘুমানোর আগে পড়ার বিশেষ দুআ। নফস, শয়তান, শিরক ও অন্যকে কষ্ট দেওয়া — এই চারটি মন্দ থেকে সুরক্ষা দেয়।"},
  {id:48,title:"তাওহিদ নবায়নের দুআ (সকাল)",arabic:"أَصْبَحْنَا عَلَىٰ فِطْرَةِ الْإِسْلَامِ ، وَعَلَىٰ كَلِمَةِ الْإِخْلَاصِ ، وَعَلَىٰ دِيْنِ نَبِيِّنَا مُحَمَّدٍ ، وَعَلَىٰ مِلَّةِ أَبِيْنَا إِبْرَاهِيْمَ حَنِيْفًا مُّسْلِمًا",bangla_meaning:"আমরা ইসলামের ফিতরাতের উপর, ইখলাসের কালেমার উপর, আমাদের নবী মুহাম্মাদ (সা.)-এর দ্বীনের উপর এবং আমাদের পিতা ইবরাহিম (আ.)-এর মিল্লাতের উপর সকাল করলাম।",bangla_benefit:"প্রতিদিন সকালে তাওহিদ নবায়ন করা হয়। দিনের শুরু ঈমানের উপর হওয়ায় সারাদিন ইসলামের পথে পরিচালিত হওয়া সহজ হয়।"},
  {id:49,title:"উত্তম দিনের দুআ",arabic:"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلّٰهِ وَالْحَمْدُ لِلّٰهِ ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِيْ هٰذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ ، وَأَعُوْذُ بِكَ مِنْ شَرِّ مَا فِيْ هٰذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ",bangla_meaning:"আমরা এবং রাজত্ব আল্লাহর জন্য সকাল করলাম, সকল প্রশংসা আল্লাহর। হে আমার রব! এই দিনে ও পরবর্তী দিনে যা কল্যাণ আছে তা চাই এবং এই দিনের ও পরবর্তী দিনের অনিষ্ট থেকে আশ্রয় চাই।",bangla_benefit:"সকালের আযকারের মধ্যে একটি গুরুত্বপূর্ণ দুআ। দিনের কল্যাণ ও অকল্যাণ থেকে মুক্তি চাওয়া হয়েছে।"},
  {id:50,title:"দিনে বরকতের দুআ",arabic:"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلّٰهِ رَبِّ الْعَالَمِيْنَ ، اَللّٰهُمَّ إِنِّيْ أَسْأَلُكَ خَيْرَ هٰذَا الْيَوْمِ ، فَتْحَهُ وَنَصْرَهُ وَنُوْرَهُ وَبَرَكَتَهُ وَهُدَاهُ",bangla_meaning:"আমরা সকাল করলাম, রাজত্ব আল্লাহ রাব্বুল আলামিনের। হে আল্লাহ! আমি এই দিনের কল্যাণ চাই — এর বিজয়, সাহায্য, নূর, বরকত ও হেদায়াত চাই।",bangla_benefit:"দিনে বরকত, বিজয়, নূর ও হেদায়াত পেতে এই দুআ পড়া হয়। প্রতিটি নতুন দিনকে আল্লাহর রাজত্বের স্বীকৃতি দিয়ে শুরু করা হয়।"},
  {id:51,title:"৪টি বাক্যে সেরা যিকির",arabic:"سُبْحَانَ اللّٰهِ وَبِحَمْدِهِ ، عَدَدَ خَلْقِهِ ، وَرِضَا نَفْسِهِ ، وَزِنَةَ عَرْشِهِ ، وَمِدَادَ كَلِمَاتِهِ",bangla_meaning:"আল্লাহর পবিত্রতা ঘোষণা করি তাঁর সৃষ্টির সংখ্যার সমান, তাঁর সন্তুষ্টির সমান, তাঁর আরশের ওজনের সমান এবং তাঁর কালিমাসমূহের পরিমাণের সমান।",bangla_benefit:"এই যিকির অন্য সব যিকিরকে ছাড়িয়ে যায়। জুওয়াইরিয়া (রা.) সকালে এটি পড়ছিলেন এবং রাসূল (সা.) বললেন এটি তোমার সারাদিনের যিকিরের চেয়ে বেশি।"},
  {id:52,title:"আল্লাহই যথেষ্ট",arabic:"حَسْبِيَ اللّٰهُ لَا إِلٰهَ إِلَّا هُوَ ، عَلَيْهِ تَوَكَّلْتُ ، وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ",bangla_meaning:"আল্লাহই আমার জন্য যথেষ্ট, তিনি ছাড়া কোনো ইলাহ নেই। তাঁর উপর ভরসা করি, তিনি মহান আরশের রব।",bangla_benefit:"সকাল ও সন্ধ্যায় ৭ বার পড়লে আল্লাহ দুনিয়া ও আখিরাতের সকল গুরুত্বপূর্ণ বিষয়ে যথেষ্ট হয়ে যান — হাদিসে বর্ণিত।"},
  {id:53,title:"সুস্বাস্থ্য ও সুরক্ষার দুআ",arabic:"اَللّٰهُمَّ عَافِنِيْ فِيْ بَدَنِيْ ، اَللّٰهُمَّ عَافِنِيْ فِيْ سَمْعِيْ ، اَللّٰهُمَّ عَافِنِيْ فِيْ بَصَرِيْ ، اَللّٰهُمَّ إِنِّيْ أَعُوْذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ وَعَذَابِ الْقَبْرِ",bangla_meaning:"হে আল্লাহ! আমার শরীরে, শ্রবণশক্তিতে ও দৃষ্টিশক্তিতে সুস্থতা দাও। হে আল্লাহ! আমি কুফর, দারিদ্র্য ও কবরের আজাব থেকে তোমার আশ্রয় নিচ্ছি।",bangla_benefit:"প্রতিদিন সকালে তিনবার পড়লে শারীরিক সুস্বাস্থ্য ও ইন্দ্রিয়শক্তি বজায় থাকে। কুফর, দারিদ্র্য ও কবরের আজাব থেকে সুরক্ষা পাওয়া যায়.",repeat:"৩X"}
];

let filtered = [...duas];

function renderCards(data) {
  const grid = document.getElementById('duaGrid');
  const noRes = document.getElementById('noResults');
  const badge = document.getElementById('countBadge');

  badge.textContent = `${data.length}টি দুআ`;

  if (data.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  grid.innerHTML = data.map((d, i) => `
    <div class="dua-card" style="animation-delay:${i * 0.04}s">
      <div class="arabic-col">
        <div>
          <div class="card-number">DUA ${String(d.id).padStart(2,'0')}</div>
          <div class="arabic-title">${d.title}</div>
          <div class="arabic-text">${d.arabic}</div>
        </div>
        ${d.repeat ? `<span class="repeat-badge">${d.repeat}</span>` : ''}
      </div>
      <div class="info-col">
        <div>
          <div class="info-section-label">বাংলা অর্থ</div>
          <p class="meaning-text">${d.bangla_meaning}</p>
        </div>
        <div class="divider"></div>
        <div class="benefit-box">
          <div class="info-section-label">ফযিলত ও উপকারিতা</div>
          <p class="benefit-text">${d.bangla_benefit}</p>
        </div>
      </div>
    </div>
  `).join('');
}

function filterDuas() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { renderCards(duas); return; }
  const res = duas.filter(d =>
    d.title.toLowerCase().includes(q) ||
    d.bangla_meaning.toLowerCase().includes(q) ||
    d.bangla_benefit.toLowerCase().includes(q) ||
    d.arabic.includes(q)
  );
  renderCards(res);
}

renderCards(duas);
</script>
