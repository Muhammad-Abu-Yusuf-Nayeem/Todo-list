<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quranic Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+Bengali:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --surface2: #f4efe6;
    --border: #e8dfd0;
    --text-primary: #2c2416;
    --text-secondary: #6b5c42;
    --text-muted: #a0916e;
    --accent: #7c5c2e;
    --accent-light: #c49a5a;
    --arabic-color: #3d2b0e;
    --tag-bg: #efe8d8;
    --shadow: 0 2px 16px rgba(100,70,20,0.07);
    --shadow-hover: 0 6px 28px rgba(100,70,20,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Lora', Georgia, serif;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  /* Subtle paper texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(196,154,90,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(124,92,46,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.7s ease both;
  }

  .header-ornament {
    color: var(--accent-light);
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    letter-spacing: 0.2em;
    opacity: 0.7;
    display: block;
    margin-bottom: 10px;
  }

  header h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(1.9rem, 4vw, 2.8rem);
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  header p {
    margin-top: 10px;
    color: var(--text-muted);
    font-size: 0.95rem;
    font-style: italic;
    font-family: 'Lora', serif;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 20px auto 0;
    width: fit-content;
  }

  .divider-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-light));
  }

  .divider-line.right {
    background: linear-gradient(90deg, var(--accent-light), transparent);
  }

  .divider-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-light);
  }

  /* Groups */
  .group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 28px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.3s ease;
    animation: fadeUp 0.6s ease both;
  }

  .group:hover {
    box-shadow: var(--shadow-hover);
  }

  .group:nth-child(2) { animation-delay: 0.1s; }
  .group:nth-child(3) { animation-delay: 0.2s; }
  .group:nth-child(4) { animation-delay: 0.3s; }
  .group:nth-child(5) { animation-delay: 0.4s; }

  .group-header {
    background: linear-gradient(135deg, var(--surface2) 0%, #ece5d5 100%);
    padding: 22px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .group-id {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .group-meta {
    flex: 1;
  }

  .group-root {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    color: var(--arabic-color);
    font-weight: 700;
    line-height: 1.3;
    direction: rtl;
    display: inline;
  }

  .group-root-romanized {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-style: italic;
    margin-left: 8px;
  }

  .group-meanings {
    display: flex;
    gap: 16px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .group-meaning {
    font-size: 0.85rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .lang-tag {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.8;
  }

  /* Words grid — 4 cards per row */
  .words-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    padding: 0;
  }

  .word-card {
    background: var(--surface);
    padding: 18px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: background 0.2s ease;
    position: relative;
  }

  .word-card:hover {
    background: var(--surface2);
  }

  .serial {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
  }

  .word-arabic {
    font-family: 'Amiri', serif;
    font-size: 1.65rem;
    color: var(--arabic-color);
    direction: rtl;
    text-align: right;
    line-height: 1.5;
    font-weight: 700;
    margin-top: 2px;
  }

  .word-english {
    font-size: 0.88rem;
    color: var(--text-primary);
    font-family: 'Lora', serif;
    margin-top: 4px;
  }

  .word-bangla {
    font-size: 0.84rem;
    color: var(--text-secondary);
    font-family: 'Noto Serif Bengali', serif;
    line-height: 1.5;
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 48px;
    color: var(--text-muted);
    font-size: 0.82rem;
    font-style: italic;
    animation: fadeUp 0.6s ease 0.5s both;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 700px) {
    .words-grid { grid-template-columns: repeat(2, 1fr); }
    .group-header { padding: 18px 18px; }
  }

  @media (max-width: 400px) {
    .words-grid { grid-template-columns: repeat(1, 1fr); }
  }
</style>
</head>

      "words": [
        {
          "serial_no": 289,

        },

        }

function parseRoot(root) {
  // Split "قُلْ (Qul)" → arabic part and romanized part
  const match = root.match(/^([\u0600-\u06FF\s\u064B-\u065F\u0670]+)\s*\(([^)]+)\)/);
  if (match) return { arabic: match[1].trim(), romanized: match[2].trim() };
  return { arabic: root, romanized: '' };
}

function render(vocabData) {
  const container = document.getElementById('groups-container');
  container.innerHTML = '';

  vocabData.vocabulary_groups.forEach((group, gi) => {
    const { arabic, romanized } = parseRoot(group.core_root);

    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    groupEl.style.animationDelay = `${gi * 0.1}s`;

    groupEl.innerHTML = `
      <div class="group-header">
        <span class="group-id">Group ${group.group_id}</span>
        <div class="group-meta">
          <div>
            <span class="group-root">${arabic}</span>
            ${romanized ? `<span class="group-root-romanized">(${romanized})</span>` : ''}
          </div>
          <div class="group-meanings">
            <span class="group-meaning"><span class="lang-tag">EN</span> ${group.core_meaning_en}</span>
            <span class="group-meaning"><span class="lang-tag">BN</span> ${group.core_meaning_bn}</span>
          </div>
        </div>
      </div>
      <div class="words-grid">
        ${group.words.map(w => `
          <div class="word-card">
            <span class="serial">${w.serial_no}</span>
            <span class="word-arabic">${w.arabic}</span>
            <span class="word-english">${w.english}</span>
            <span class="word-bangla">${w.bangla}</span>
          </div>
        `).join('')}
      </div>
    `;

    container.appendChild(groupEl);
  });
}

render(data);
